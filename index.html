<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Rewards Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-zinc-900 border border-zinc-800 rounded-2xl p-6 shadow-2xl space-y-6">
        
        <div class="relative bg-gradient-to-br from-zinc-800 to-black p-6 rounded-xl border border-zinc-700/50 shadow-lg">
            <h1 class="text-lg font-bold text-white">Maya Rewards Calculator</h1>
            <p class="text-[10px] text-zinc-400 font-mono">1 Mile = ₱0.16 | Base: ₱40 = 1 Mile</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-semibold uppercase text-zinc-400 mb-1">Customer Spend (PHP)</label>
                <input type="number" id="spend-input" placeholder="0.00" class="w-full bg-zinc-950 border border-zinc-700 rounded-lg py-2 px-3 text-white outline-none">
            </div>

            <div>
                <label class="block text-xs font-semibold uppercase text-zinc-400 mb-1">Miles Earned</label>
                <input type="number" id="miles-input" placeholder="0" class="w-full bg-zinc-950 border border-zinc-700 rounded-lg py-2 px-3 text-white outline-none">
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 pt-4 border-t border-zinc-800">
            <div class="bg-zinc-950 p-3 rounded-lg border border-zinc-800">
                <p class="text-[9px] uppercase text-zinc-500 font-bold">Cash Value</p>
                <p class="text-lg font-bold text-emerald-400">₱<span id="cash-value">0.00</span></p>
            </div>
            <div class="bg-zinc-950 p-3 rounded-lg border border-zinc-800">
                <p class="text-[9px] uppercase text-zinc-500 font-bold">Est. Required Spend</p>
                <p class="text-lg font-bold text-white">₱<span id="est-spend">0.00</span></p>
            </div>
        </div>
    </div>

    <script>
        const spendInput = document.getElementById('spend-input');
        const milesInput = document.getElementById('miles-input');
        const cashDisplay = document.getElementById('cash-value');
        const spendDisplay = document.getElementById('est-spend');

        // Logic: 
        // 1. Miles Earned = Spend / 40 (assuming 1x multiplier)
        // 2. Cash Value = Miles * 0.16
        
        spendInput.addEventListener('input', () => {
            const spend = parseFloat(spendInput.value) || 0;
            const miles = spend / 40;
            milesInput.value = miles.toFixed(2);
            calculateRewards(miles, spend);
        });

        milesInput.addEventListener('input', () => {
            const miles = parseFloat(milesInput.value) || 0;
            const spend = miles * 40;
            spendInput.value = spend.toFixed(2);
            calculateRewards(miles, spend);
        });

        function calculateRewards(miles, spend) {
            cashDisplay.textContent = (miles * 0.16).toLocaleString(undefined, {minimumFractionDigits: 2});
            spendDisplay.textContent = spend.toLocaleString(undefined, {minimumFractionDigits: 2});
        }
    </script>
</body>
</html>
